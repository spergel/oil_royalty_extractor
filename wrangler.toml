name = "oil-price-oracle"
main = "worker.js"
compatibility_date = "2024-09-23"

# ---- Cron: 1st of every month at 14:17 UTC ----
[triggers]
crons = ["17 14 1 * *"]

# ---- KV namespace for price storage ----
# After running: wrangler kv:namespace create OIL_KV_BINDING
# paste the returned id below.
[[kv_namespaces]]
binding = "OIL_KV_BINDING"
id     = "6106862e203f48e88680306205fd5664"

# ---- EIA API key ----
# Local dev: place `EIA_API_KEY=...` in `.env` (used by `wrangler dev`).
# Deployed worker: set the secret in Cloudflare dashboard or via:
#   wrangler secret put EIA_API_KEY
