name = "oil-price-oracle"
main = "worker.js"
compatibility_date = "2024-09-23"

# ---- Cron: 1st of every month at 14:17 UTC ----
[triggers]
crons = ["17 14 1 * *"]

# ---- KV namespace for price storage ----
# After running: wrangler kv:namespace create OIL_KV_BINDING
# paste the returned id below.
[[kv_namespaces]]
binding = "OIL_KV_BINDING"
id     = "REPLACE_WITH_KV_NAMESPACE_ID"

# ---- EIA API key — set in Cloudflare dashboard as an environment variable ----
# Workers & Pages -> oil-price-oracle -> Settings -> Variables and Secrets
# Add variable: EIA_API_KEY = <your key>
[vars]
EIA_API_KEY = ""   # placeholder; override in Cloudflare dashboard
