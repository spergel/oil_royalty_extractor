name = "oil-price-oracle"
main = "worker.js"
compatibility_date = "2024-09-23"

# ---- Cron: 1st of every month at 14:17 UTC ----
[triggers]
crons = ["17 14 1 * *"]

# ---- KV namespace for price storage ----
# After running: wrangler kv:namespace create PRICES
# paste the returned id below.
[[kv_namespaces]]
binding = "PRICES"
id     = "REPLACE_WITH_KV_NAMESPACE_ID"

# ---- EIA API key stored as a Worker secret (never committed) ----
# Set with: wrangler secret put EIA_API_KEY
# (prompts for the value, stores encrypted in Cloudflare)
